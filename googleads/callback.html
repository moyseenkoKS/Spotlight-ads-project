<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OAuth Token</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #fff1f2, #eef2ff);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #111827;
    }

    /* Твой логотип (верхний левый угол) */
    .main-logo {
      position: fixed;
      top: 20px;
      left: 20px;
      height: 50px;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      max-width: 600px;
      width: 90%;
    }

    /* Логотип Google Ads */
    .ads-logo {
      height: 50px;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
    }

    p {
      color: #6b7280;
      margin-bottom: 20px;
    }

    .token-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      padding: 15px;
      border-radius: 10px;
      font-family: monospace;
      word-break: break-all;
      text-align: left;
      margin-top: 15px;
    }

    .button {
      display: inline-block;
      padding: 12px 20px;
      background: #6366f1;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      margin-top: 20px;
      cursor: pointer;
      border: none; /* убрали обводку */
    }

    .button:hover {
      background: #4f46e5;
    }

    .success {
      color: #10b981;
      font-weight: 500;
    }
  </style>
</head>

<body>

  <!-- Твой логотип -->
  <img src="../spot_ads_web_lobo.png" class="main-logo" alt="Spot Ads Logo">

  <div class="card">

    <!-- Google Ads логотип -->
    <img src="../google-ads-logo.png" class="ads-logo" alt="Google Ads">

    <h1>OAuth Token Received 🎉</h1>
    <p id="status">Parsing data from URL...</p>

    <div id="tokens"></div>

    <button class="button" onclick="copyAll()">Copy All</button>
  </div>

  <script>
    function parseParams(str) {
      const params = new URLSearchParams(str);
      const obj = {};
      for (const [key, value] of params.entries()) {
        obj[key] = value;
      }
      return obj;
    }

    function getAllParams() {
      const query = window.location.search.substring(1);
      const hash = window.location.hash.substring(1);

      return {
        ...parseParams(query),
        ...parseParams(hash)
      };
    }

    function render() {
      const data = getAllParams();
      const container = document.getElementById("tokens");
      const status = document.getElementById("status");

      if (Object.keys(data).length === 0) {
        status.innerText = "No tokens found in URL";
        return;
      }

      status.innerHTML = '<span class="success">Data successfully parsed</span>';

      let html = "";
      for (const key in data) {
        html += `
          <div class="token-box">
            <strong>${key}:</strong><br>${data[key]}
          </div>
        `;
      }

      container.innerHTML = html;
    }

    function copyAll() {
      const data = getAllParams();
      const text = JSON.stringify(data, null, 2);

      navigator.clipboard.writeText(text);
      alert("Copied!");
    }

    render();
  </script>

</body>
</html>
